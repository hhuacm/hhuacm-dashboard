pre-commit:
  commands:
    react-doctor:
      run: react_doctor_output=$(mktemp "${TMPDIR:-/tmp}/react-doctor-hook.XXXXXX"); if react-doctor --staged --fail-on warning > "$react_doctor_output" 2>&1; then rm -f "$react_doctor_output"; else rm -f "$react_doctor_output"; printf "%s\n" "React Doctor found staged regressions." "Run react-doctor --staged --fail-on warning to inspect." "Want them fixed? Ask your agent to run that command and resolve the findings." >&2; fi
  parallel: true
  jobs:
    - name: ultracite
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,md}"
      run: bun x ultracite check {staged_files}
    - name: lefthook-config
      glob: "lefthook.yml"
      run: bun x lefthook validate

pre-push:
  parallel: false
  jobs:
    - name: check-types
      run: bun run check-types
    - name: build
      run: bun run build
