pre-commit:
  parallel: true
  jobs:
    - name: ultracite
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,md}"
      run: bun x ultracite check {staged_files}
    - name: lefthook-config
      glob: "lefthook.yml"
      run: bun x lefthook validate

pre-push:
  parallel: false
  jobs:
    - name: check-types
      run: bun run check-types
    - name: build
      run: bun run build
